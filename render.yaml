services:
  - type: worker
    name: aura-visual-ai-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: STABILITY_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0  # <--- This locks it to a stable version
